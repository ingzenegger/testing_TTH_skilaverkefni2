name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  vitest:
    name: Vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skilaverkefni-2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: skilaverkefni-2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test:ci

  cypress-run:
    name: Cypress
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: skilaverkefni-2
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # Install npm dependencies, cache them correctly
      # and run all Cypress tests
      - name: Cypress run
        uses: cypress-io/github-action@v7
        with:
          working-directory: skilaverkefni-2
          build: npm run build
          start: npm run preview
